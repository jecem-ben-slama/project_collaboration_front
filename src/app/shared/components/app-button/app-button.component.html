<button [type]="type" class="app-btn" [ngClass]="[
        color,
        fullWidth ? 'full-width' : '',
        loading ? 'loading' : ''
    ]" [disabled]="disabled || loading" (click)="onClick()">

    <!-- Spinner -->
    <span class="spinner" *ngIf="loading"></span>

    <!-- Icon -->
    <mat-icon *ngIf="icon && !loading" class="btn-icon">
        {{ icon }}
    </mat-icon>

    <!-- Label -->
    <span class="btn-label" *ngIf="!loading">
        {{ label }}
    </span>

</button>
