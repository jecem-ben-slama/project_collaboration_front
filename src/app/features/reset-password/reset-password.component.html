<div class="login-wrapper">
    <div class="bg-blur-circle"></div>

    <mat-card class="login-card glass-effect">
        <mat-card-header>
            <div class="brand-icon">
                <mat-icon>lock_reset</mat-icon>
            </div>
            <mat-card-title>Reset Password</mat-card-title>
            <mat-card-subtitle>Enter your token and new credentials</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
            <form (ngSubmit)="onResetPassword()">
                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Reset Token</mat-label>
                    <mat-icon matPrefix>vpn_key</mat-icon>
                    <input matInput type="text" [(ngModel)]="resetData.token" name="token" required>
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>New Password</mat-label>
                    <mat-icon matPrefix>password</mat-icon>
                    <input matInput [type]="hideNewPassword ? 'password' : 'text'" [(ngModel)]="resetData.newPassword"
                        name="newPassword" required>
                    <button mat-icon-button matSuffix (click)="hideNewPassword = !hideNewPassword" type="button">
                        <mat-icon>{{hideNewPassword ? 'visibility_off' : 'visibility'}}</mat-icon>
                    </button>
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Confirm Password</mat-label>
                    <mat-icon matPrefix>done_all</mat-icon>
                    <input matInput [type]="hideConfirmPassword ? 'password' : 'text'"
                        [(ngModel)]="resetData.confirmPassword" name="confirmPassword" (input)="isSubmitted = false"
                        required>
                    <button mat-icon-button matSuffix (click)="hideConfirmPassword = !hideConfirmPassword"
                        type="button">
                        <mat-icon>{{hideConfirmPassword ? 'visibility_off' : 'visibility'}}</mat-icon>
                    </button>

                    <mat-error *ngIf="showMismatchError">
                        Passwords do not match
                    </mat-error>
                </mat-form-field>

                <button mat-flat-button type="submit" class="login-btn full-width" [disabled]="isLoading">
                    <span *ngIf="!isLoading">Update Password</span>
                    <mat-spinner diameter="20" *ngIf="isLoading"></mat-spinner>
                </button>
            </form>
        </mat-card-content>

        <mat-card-footer class="login-footer">
            <a routerLink="/login">Back to Login</a>
        </mat-card-footer>
    </mat-card>
</div>
