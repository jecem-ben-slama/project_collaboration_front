<mat-toolbar color="accent">
    <span>My Workspace</span>
    <span class="spacer"></span>
    <span class="user-info" *ngIf="userEmail">{{ userEmail }}</span>
    <button mat-icon-button (click)="onLogout()">
        <mat-icon>logout</mat-icon>
    </button>
</mat-toolbar>

<mat-sidenav-container class="user-container">
    <mat-sidenav mode="side" opened class="user-sidenav">
        <mat-nav-list>
            <div class="menu-label">MY WORK</div>

            <a mat-list-item routerLink="/user/projects" routerLinkActive="active-link">
                <mat-icon matListItemIcon>assignment</mat-icon>
                <span matListItemTitle>My Projects</span>
            </a>

            <a mat-list-item routerLink="/user/profile" routerLinkActive="active-link">
                <mat-icon matListItemIcon>person</mat-icon>
                <span matListItemTitle>Profile Settings</span>
            </a>

        </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content class="user-content">
        <router-outlet></router-outlet>
    </mat-sidenav-content>
</mat-sidenav-container>
