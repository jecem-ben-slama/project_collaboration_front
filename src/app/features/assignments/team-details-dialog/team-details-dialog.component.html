<h2 mat-dialog-title>Team Details: {{ project.name }}</h2>

<mat-dialog-content>
    <mat-list>
        <mat-list-item *ngFor="let user of project.assignedUsers" class="user-item">
            <mat-icon matListItemIcon>account_circle</mat-icon>
            <div matListItemTitle>{{ user.name || user.email }}</div>
            <div matListItemLine>{{ user.categoryLabel }}</div>

            <div matListItemMeta>
                <button mat-icon-button color="primary" (click)="onEdit(user)">
                    <mat-icon>edit</mat-icon>
                </button>
                <button mat-icon-button color="warn" (click)="onRemove(user.id)">
                    <mat-icon>delete</mat-icon>
                </button>
            </div>
        </mat-list-item>
    </mat-list>

    <div *ngIf="project.assignedUsers.length === 0" class="empty-state">
        No members assigned to this project.
    </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button (click)="dialogRef.close()">Close</button>
</mat-dialog-actions>
