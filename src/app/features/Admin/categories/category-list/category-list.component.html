<div class="overview-container">
    <div class="header-container">
        <div class="title-group">
            <h1>Category Management</h1>
            <p>Organize and filter project resource classifications</p>
        </div>

        <div class="action-row">
            <div class="search-wrapper">
                <mat-icon>search</mat-icon>
                <input type="text" placeholder="Search categories..." (keyup)="applyFilter($event)">
            </div>

            <button class="primary-action-btn" (click)="openCategoryForm()">
                <mat-icon>add</mat-icon>
                <span>Add Category</span>
            </button>
        </div>
    </div>

    <div *ngIf="isLoading" class="loader-state">
        <mat-spinner diameter="32"></mat-spinner>
    </div>

    <div class="table-surface" *ngIf="!isLoading">
        <table mat-table [dataSource]="filteredCategories">

            <ng-container matColumnDef="id">
                <th mat-header-cell *matHeaderCellDef>Reference</th>
                <td mat-cell *matCellDef="let cat" class="id-cell">#{{cat.id}}</td>
            </ng-container>

            <ng-container matColumnDef="label">
                <th mat-header-cell *matHeaderCellDef>Category Label</th>
                <td mat-cell *matCellDef="let cat" class="label-cell">{{cat.label}}</td>
            </ng-container>

            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef class="action-header">Actions</th>
                <td mat-cell *matCellDef="let cat">
                    <div class="action-group">
                        <button class="icon-action-btn edit" (click)="openCategoryForm(cat)" matTooltip="Edit Category">
                            <mat-icon>edit_note</mat-icon>
                        </button>
                        <button class="icon-action-btn delete" (click)="onDelete(cat.id)" matTooltip="Delete Category">
                            <mat-icon>delete_outline</mat-icon>
                        </button>
                    </div>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="neo-row"></tr>
        </table>

        <div *ngIf="filteredCategories.length === 0" class="empty-results">
            <mat-icon>category</mat-icon>
            <p>No categories found matching your search.</p>
        </div>
    </div>
</div>
