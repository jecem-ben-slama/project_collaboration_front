<div class="page-header"
    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h2>Category Management</h2>
    <button mat-raised-button color="primary" (click)="openCategoryForm()">
        <mat-icon>add</mat-icon> Add Category
    </button>
</div>

<mat-card>
    <div *ngIf="isLoading" style="display: flex; justify-content: center; padding: 20px;">
        <mat-spinner diameter="40"></mat-spinner>
    </div>

    <table mat-table [dataSource]="categories" *ngIf="!isLoading" style="width: 100%;">

        <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef> ID </th>
            <td mat-cell *matCellDef="let cat"> #{{cat.id}} </td>
        </ng-container>

        <ng-container matColumnDef="label">
            <th mat-header-cell *matHeaderCellDef> Label </th>
            <td mat-cell *matCellDef="let cat"> {{cat.label}} </td>
        </ng-container>

        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef> Actions </th>
            <td mat-cell *matCellDef="let cat">
                <button mat-icon-button color="accent" (click)="openCategoryForm(cat)">
                    <mat-icon>edit</mat-icon>
                </button>
                <button mat-icon-button color="warn" (click)="onDelete(cat.id)">
                    <mat-icon>delete</mat-icon>
                </button>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
</mat-card>
