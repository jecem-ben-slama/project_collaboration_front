<div class="dialog-header">
    <mat-icon color="primary">person_add</mat-icon>
    <h2 mat-dialog-title>Add Team Member</h2>
</div>

<mat-dialog-content [formGroup]="assignForm" class="form-container">

    <mat-form-field appearance="outline" class="full-width">
        <mat-label>Employee</mat-label>
        <mat-select formControlName="userId">
            <mat-option *ngFor="let user of users$ | async" [value]="user.id">
                {{ user.email }}
            </mat-option>
        </mat-select>
        <mat-icon matPrefix>badge</mat-icon>

        <mat-error *ngIf="assignForm.get('userId')?.hasError('required')">
            Employee is required
        </mat-error>

        <mat-error *ngIf="assignForm.get('userId')?.hasError('duplicate')">
            This employee is already assigned to this project.
        </mat-error>
    </mat-form-field>

    <div class="date-row">
        <mat-form-field appearance="outline">
            <mat-label>Start Date</mat-label>
            <input matInput [matDatepicker]="startPicker" formControlName="startDate"
                [matDatepickerFilter]="disablePastDates">
            <mat-datepicker-toggle matSuffix [for]="startPicker"></mat-datepicker-toggle>
            <mat-datepicker #startPicker></mat-datepicker>
            <mat-error *ngIf="assignForm.get('startDate')?.hasError('required')">
                Start date is required
            </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>End Date</mat-label>
            <input matInput [matDatepicker]="endPicker" formControlName="endDate"
                [matDatepickerFilter]="disablePastDates">
            <mat-datepicker-toggle matSuffix [for]="endPicker"></mat-datepicker-toggle>
            <mat-datepicker #endPicker></mat-datepicker>
            <mat-error *ngIf="assignForm.get('endDate')?.hasError('required')">
                End date is required
            </mat-error>
            <mat-error *ngIf="assignForm.get('endDate')?.hasError('dateInvalid')">
                End date must be after start date
            </mat-error>
        </mat-form-field>
    </div>

    <div class="leader-section">
        <div class="leader-text">
            <span class="title">Project Role</span>
        </div>
<mat-button-toggle-group formControlName="teamLeader" class="leader-toggle" aria-label="Role selection">
    <mat-button-toggle [value]="true">
        <mat-icon>star</mat-icon>
        Leader
    </mat-button-toggle>

    <mat-button-toggle [value]="false">
        <mat-icon>person</mat-icon>
        Member
    </mat-button-toggle>
</mat-button-toggle-group>
    </div>

</mat-dialog-content>

<mat-divider></mat-divider>

<mat-dialog-actions align="end">
    <button mat-button (click)="dialogRef.close()" class="cancel-btn">
        Cancel
    </button>
    <app-button label="Assign Member" [disabled]="assignForm.invalid || isSubmitting" (btnClick)="onSubmit()">
    </app-button>
</mat-dialog-actions>
