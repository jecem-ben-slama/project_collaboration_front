<mat-toolbar class="admin-toolbar">
    <div class="brand">
        <mat-icon class="brand-icon">space_dashboard</mat-icon>
        <span class="brand-name">ADMIN PANEL</span>
    </div>

    <div class="user-info" *ngIf="adminEmail">
        <span class="email">{{ adminEmail }}</span>

        <button mat-stroked-button class="logout-btn" (click)="onLogout()">
            <mat-icon>logout</mat-icon>
            <span>Logout</span>
        </button>
    </div>
</mat-toolbar>

<mat-sidenav-container class="admin-container">
    <mat-sidenav mode="side" opened class="admin-sidenav">
        <mat-nav-list>
            <div class="nav-section">
                <div class="section-title">Main Menu</div>
                <a mat-list-item routerLink="/admin/dashboard" routerLinkActive="active-link">
                    <mat-icon matListItemIcon>space_dashboard</mat-icon>
                    <span matListItemTitle>Dashboard</span>
                </a>
                <a mat-list-item routerLink="/admin/projects" routerLinkActive="active-link">
                    <mat-icon matListItemIcon>folder_open</mat-icon>
                    <span matListItemTitle>Projects</span>
                </a>
                <a mat-list-item routerLink="/admin/users" routerLinkActive="active-link">
                    <mat-icon matListItemIcon>person_outline</mat-icon>
                    <span matListItemTitle>User Directory</span>
                </a>
                <a mat-list-item routerLink="/admin/assignments" routerLinkActive="active-link">
                    <mat-icon matListItemIcon>assignment_turned_in</mat-icon>
                    <span matListItemTitle>Assignments</span>
                </a>
                <a mat-list-item routerLink="/admin/categories" routerLinkActive="active-link">
                    <mat-icon matListItemIcon>list_alt</mat-icon>
                    <span matListItemTitle>Categories</span>
                </a>

                <div class="section-title" style="margin-top: 20px;">Settings</div>
                <a mat-list-item routerLink="/admin/profile" routerLinkActive="active-link">
                    <mat-icon matListItemIcon>manage_accounts</mat-icon>
                    <span matListItemTitle>Profile</span>
                </a>
            </div>
        </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content class="admin-content">
        <div class="main-card">
            <router-outlet></router-outlet>
        </div>
    </mat-sidenav-content>
</mat-sidenav-container>
