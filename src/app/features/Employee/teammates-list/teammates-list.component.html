<div class="dialog-header">
    <div class="header-content">
        <mat-icon class="header-icon">groups</mat-icon>
        <div class="title-stack">
            <h2>Project Team</h2>
            <p>Collaborators assigned to this project</p>
        </div>
    </div>
    <button class="close-btn" (click)="dialogRef.close()" *ngIf="dialogRef">
        <mat-icon>close</mat-icon>
    </button>
</div>

<mat-dialog-content class="teammate-list-wrapper">
    <div *ngIf="isLoading" class="state-container">
        <mat-spinner diameter="32"></mat-spinner>
        <p>Fetching teammates...</p>
    </div>

    <div *ngIf="!isLoading">
        <div class="teammate-item" *ngFor="let user of teammates">
            <div class="avatar-box" [class.leader-border]="user.teamLeader">
                {{ (user.name || user.email || 'U') | slice:0:1 | uppercase }}
            </div>

            <div class="teammate-details">
                <p class="teammate-name">{{ user.name || user.email }}</p>
                <div class="role-row">
                    <span class="category-tag">{{ user.categoryLabel || 'Team Member' }}</span>
                </div>
            </div>

            <div class="leader-indicator" *ngIf="user.teamLeader" matTooltip="Team Leader">
                <mat-icon>workspace_premium</mat-icon>
            </div>
        </div>

        <div *ngIf="teammates.length === 0" class="empty-teammates">
            <div class="empty-circle">
                <mat-icon>group_off</mat-icon>
            </div>
            <p>No teammates found for this project.</p>
        </div>
    </div>
</mat-dialog-content>
