<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h2>Projects</h2>
<app-button label="New Project" icon="add" (btnClick)="openProjectForm()">
</app-button>
</div>

<mat-card>
    <table mat-table [dataSource]="projects" class="full-width" *ngIf="!isLoading">

        <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef> Name </th>
            <td mat-cell *matCellDef="let p"> <strong>{{p.name}}</strong> </td>
        </ng-container>

        <ng-container matColumnDef="description">
            <th mat-header-cell *matHeaderCellDef> Description </th>
            <td mat-cell *matCellDef="let p"> {{p.description}} </td>
        </ng-container>

        <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef> Status </th>
            <td mat-cell *matCellDef="let p">
                <span class="status-chip">{{p.status}}</span>
            </td>
        </ng-container>

        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef> Actions </th>
            <td mat-cell *matCellDef="let p">
                <button mat-icon-button color="accent" (click)="openProjectForm(p)"><mat-icon>edit</mat-icon></button>
                <button mat-icon-button color="warn" (click)="onDelete(p.id)"><mat-icon>delete</mat-icon></button>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
</mat-card>
