<div class="unauthorized-wrapper">
    <div class="unauthorized-card">
        <!-- Visual cue using Material Icons -->
        <div class="icon-container">
            <mat-icon>gpp_maybe</mat-icon>
        </div>

        <h1>403</h1>
        <h2>Access Denied</h2>

        <p>
            It looks like you don't have the necessary permissions to access this workspace.
            Please contact your administrator if you believe this is a mistake.
        </p>

        <div class="action-area">
            <a routerLink="/login" class="btn-primary">
                <mat-icon>arrow_back</mat-icon>
                Return to Login
            </a>
        </div>
    </div>
</div>
