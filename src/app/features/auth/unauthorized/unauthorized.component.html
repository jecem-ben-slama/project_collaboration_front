<div class="unauthorized-container">
    <!-- Decorative background elements to enhance the 'Glass' look -->
    <div class="blur-circle circle-1"></div>
    <div class="blur-circle circle-2"></div>

    <mat-card class="unauthorized-card glass-effect">
        <mat-card-content>
            <div class="icon-header">
                <div class="icon-bg">
                    <mat-icon>shield_lock</mat-icon>
                </div>
            </div>

            <h1 class="error-code">403</h1>
            <h2 class="error-title">Access Denied</h2>

            <p class="error-message">
                You do not have the required permissions to view this workspace.
                If you believe this is an error, please contact your system administrator.
            </p>

            <div class="action-wrapper">
                <button (click)="goBack()" class="back-btn">
                    <mat-icon>arrow_back</mat-icon>
                    <span>{{ authService.isLoggedIn() ? 'Go to Dashboard' : 'Back to Login' }}</span>
                </button>
            </div>
        </mat-card-content>
    </mat-card>
</div>
