<div class="login-wrapper">
    <mat-card class="login-card">
        <mat-card-header>
            <mat-card-title>Project Collaboration Platform</mat-card-title>
            <mat-card-subtitle>Please sign in to continue</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
            <form (ngSubmit)="onLogin()" #loginForm="ngForm">

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Email Address</mat-label>
                    <input matInput type="email" name="email" [(ngModel)]="loginData.email" required email>
                    <mat-icon matSuffix>email</mat-icon>
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Password</mat-label>
                    <input matInput type="password" name="password" [(ngModel)]="loginData.password" required>
                    <mat-icon matSuffix>lock</mat-icon>
                </mat-form-field>

                <button mat-raised-button color="primary" class="full-width" [disabled]="!loginForm.valid || isLoading">
                    <span *ngIf="!isLoading">Login</span>
                    <mat-spinner diameter="20" *ngIf="isLoading"></mat-spinner>
                </button>

            </form>
        </mat-card-content>
    </mat-card>
</div>
