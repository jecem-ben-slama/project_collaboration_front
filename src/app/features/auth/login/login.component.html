<div class="login-wrapper">
    <div class="bg-blur-circle"></div>

    <mat-card class="login-card glass-effect">
        <mat-card-header>
            <div class="brand-icon">
                <mat-icon>hub</mat-icon>
            </div>
            <mat-card-title>Welcome Back</mat-card-title>
            <mat-card-subtitle>Sign in to your collaboration workspace</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
            <form [formGroup]="loginForm" (ngSubmit)="onLogin()">

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Email Address</mat-label>
                    <mat-icon matPrefix>alternate_email</mat-icon>
                    <input matInput type="email" formControlName="email" placeholder="example@iit.tn">
                    <mat-error *ngIf="loginForm.get('email')?.errors?.['email']">Invalid email format</mat-error>
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Password</mat-label>
                    <mat-icon matPrefix>lock_outline</mat-icon>
                    <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password">
                    <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button"
                        tabindex="-1">
                        <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
                    </button>
                    <mat-error *ngIf="loginForm.get('password')?.errors?.['minlength']">Min 6 characters
                        required</mat-error>
                </mat-form-field>

                <div class="form-options">
                    <a routerLink="/forgot-password" class="forgot-link">Forgot Password?</a>
                </div>

                <div class="error-msg" *ngIf="errorMessage">
                    <mat-icon>error_outline</mat-icon>
                    <span>{{ errorMessage }}</span>
                </div>

                <button mat-flat-button type="submit" class="login-btn full-width"
                    [disabled]="loginForm.invalid || loading">
                    <span *ngIf="!loading">Secure Login</span>
                    <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
                </button>
            </form>
        </mat-card-content>

    </mat-card>
</div>
