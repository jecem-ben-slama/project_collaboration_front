<div class="auth-container">
    <div class="glass-card auth-card">
        <h2>Forgot Password</h2>
        <p>Enter your email and we'll send you a 1-hour reset token.</p>

        <div class="input-group">
            <label>Email Address</label>
            <input type="email" [(ngModel)]="email" placeholder="name@example.com">
        </div>

        <button class="primary-btn" (click)="sendResetToken()" [disabled]="!email || isLoading">
            <mat-spinner diameter="20" *ngIf="isLoading"></mat-spinner>
            <span *ngIf="!isLoading">Send Token</span>
        </button>

        <a routerLink="/login" class="back-link">Back to Login</a>
    </div>
</div>
